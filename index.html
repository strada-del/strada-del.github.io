<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaoVertex</title>
<style>
  *{
    box-sizing:border-box;
  }

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 20% 20%, rgba(37,99,235,.18), transparent 35%),
      radial-gradient(circle at 85% 80%, rgba(147,51,234,.22), transparent 40%),
      linear-gradient(135deg,#020617,#0f172a 55%,#160b2e);
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    text-align:center;
    overflow-x:hidden;
    overflow-y:auto;
  }

  .container{
    width:100%;
    max-width:780px;
    margin:auto 0;
    padding:56px 28px;
  }

  .logo{
    width:min(520px, 88vw);
    height:auto;
    display:block;
    margin:0 auto 44px;
  }

  .main-copy{
    font-size:clamp(28px, 5vw, 42px);
    font-weight:500;
    letter-spacing:.04em;
    margin:0 0 28px;
    color:#f8fafc;
  }

  .sub-copy{
    font-size:clamp(18px, 3.6vw, 28px);
    letter-spacing:.08em;
    margin:0;
    color:#94a3b8;
  }

  .line{
    width:132px;
    height:1px;
    margin:48px auto 38px;
    background:linear-gradient(90deg,transparent,#38bdf8,#a855f7,transparent);
  }

  .tools-label{
    margin:0 0 18px;
    color:#64748b;
    font-size:12px;
    font-weight:700;
    letter-spacing:.24em;
  }

  .tools-menu{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:14px;
    margin:0 auto 42px;
  }

  .tool-link{
    position:relative;
    display:flex;
    align-items:center;
    gap:14px;
    min-width:0;
    padding:17px 18px;
    overflow:hidden;
    border:1px solid rgba(148,163,184,.18);
    border-radius:18px;
    color:#f8fafc;
    background:rgba(15,23,42,.48);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
    text-align:left;
    text-decoration:none;
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    transition:transform .2s ease,border-color .2s ease,background .2s ease,box-shadow .2s ease;
  }

  .tool-link::after{
    content:"→";
    margin-left:auto;
    color:#64748b;
    font-size:18px;
    transition:transform .2s ease,color .2s ease;
  }

  .tool-link:hover{
    transform:translateY(-2px);
    border-color:rgba(56,189,248,.42);
    background:rgba(18,31,55,.68);
    box-shadow:0 14px 34px rgba(2,6,23,.26),inset 0 1px 0 rgba(255,255,255,.06);
  }

  .tool-link:last-child:hover{
    border-color:rgba(168,85,247,.42);
  }

  .tool-link:hover::after{
    color:#e2e8f0;
    transform:translateX(3px);
  }

  .tool-link:focus-visible{
    outline:2px solid #38bdf8;
    outline-offset:3px;
  }

  .tool-icon{
    display:grid;
    width:42px;
    height:42px;
    flex:0 0 42px;
    place-items:center;
    border:1px solid rgba(56,189,248,.22);
    border-radius:13px;
    color:#67e8f9;
    background:linear-gradient(145deg,rgba(14,165,233,.14),rgba(37,99,235,.06));
  }

  .tool-link:last-child .tool-icon{
    border-color:rgba(168,85,247,.24);
    color:#c084fc;
    background:linear-gradient(145deg,rgba(168,85,247,.14),rgba(79,70,229,.06));
  }

  .tool-icon svg{
    width:22px;
    height:22px;
    fill:none;
    stroke:currentColor;
    stroke-linecap:round;
    stroke-linejoin:round;
    stroke-width:1.8;
  }

  .tool-copy{
    min-width:0;
  }

  .tool-name{
    display:block;
    overflow:hidden;
    font-size:14px;
    font-weight:700;
    letter-spacing:.03em;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  .tool-description{
    display:block;
    margin-top:4px;
    overflow:hidden;
    color:#64748b;
    font-size:11px;
    font-weight:500;
    letter-spacing:.03em;
    text-overflow:ellipsis;
    white-space:nowrap;
  }

  footer{
    color:#64748b;
    font-size:18px;
    letter-spacing:.06em;
  }

  @media (max-width:600px){
    body{
      align-items:flex-start;
    }

    .container{
      margin:0;
      padding:44px 20px 36px;
    }

    .logo{
      margin-bottom:36px;
    }

    .line{
      margin-top:40px;
      margin-bottom:32px;
    }

    .tools-menu{
      grid-template-columns:1fr;
      gap:10px;
      margin-bottom:36px;
    }

    .tool-link{
      padding:15px 16px;
    }

    footer{
      font-size:14px;
    }
  }

  @media (prefers-reduced-motion:reduce){
    .tool-link,.tool-link::after{
      transition:none;
    }
  }
</style>
</head>
<body>
  <main class="container">
    <img class="logo" src="logo.png" alt="TaoVertex">

    <p class="main-copy">Life with AI.</p>
    <p class="sub-copy">Create. Improve. Simplify.</p>

    <div class="line"></div>

    <p class="tools-label">TOOLS</p>
    <nav class="tools-menu" aria-label="TaoVertexツール">
      <a class="tool-link" href="https://taovertex.com/clear/">
        <span class="tool-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="7" height="7" rx="1"></rect>
            <rect x="14" y="3" width="7" height="7" rx="1"></rect>
            <rect x="3" y="14" width="7" height="7" rx="1"></rect>
            <path d="M14 17.5h7M17.5 14v7"></path>
          </svg>
        </span>
        <span class="tool-copy">
          <span class="tool-name">Transparent</span>
          <span class="tool-description">貼るだけで背景透過</span>
        </span>
      </a>

      <a class="tool-link" href="https://taovertex.com/qr_c/">
        <span class="tool-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4z"></path>
            <path d="M14 14h2v2h-2zM18 14h2v2h-2zM14 18h2v2h-2zM18 18h2v2h-2z"></path>
          </svg>
        </span>
        <span class="tool-copy">
          <span class="tool-name">QR Code Maker</span>
          <span class="tool-description">貼るだけでQRコード</span>
        </span>
      </a>
    </nav>

    <footer>© 2026 TaoVertex</footer>
  </main>
</body>
</html>
