<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaoVertex</title>
<style>
  *{
    box-sizing:border-box;
  }

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 20% 20%, rgba(37,99,235,.18), transparent 35%),
      radial-gradient(circle at 85% 80%, rgba(147,51,234,.22), transparent 40%),
      linear-gradient(135deg,#020617,#0f172a 55%,#160b2e);
    color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    overflow:hidden;
  }

  .container{
    width:100%;
    max-width:780px;
    padding:56px 28px;
  }

 .logo{
    width: 520px;
    max-width: 92vw;
}
  .main-copy{
    font-size:clamp(28px, 5vw, 42px);
    font-weight:500;
    letter-spacing:.04em;
    margin:0 0 28px;
    color:#f8fafc;
  }

  .sub-copy{
    font-size:clamp(18px, 3.6vw, 28px);
    letter-spacing:.08em;
    margin:0;
    color:#94a3b8;
  }

  .line{
    width:132px;
    height:1px;
    margin:48px auto 44px;
    background:linear-gradient(90deg,transparent,#38bdf8,#a855f7,transparent);
  }

  footer{
    color:#64748b;
    font-size:18px;
    letter-spacing:.06em;
  }
</style>
</head>
<body>
  <main class="container">
    <img class="logo" src="logo.png" alt="TaoVertex">

    <p class="main-copy">Life with AI.</p>
    <p class="sub-copy">Create. Improve. Simplify.</p>

    <div class="line"></div>

    <footer>© 2026 TaoVertex</footer>
  </main>
</body>
</html>
